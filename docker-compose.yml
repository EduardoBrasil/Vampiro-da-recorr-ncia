version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: vampiro-db
    environment:
      POSTGRES_USER: ${DB_USER:-vampiro_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${DB_NAME:-vampiro_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vampiro_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vampiro-network

  # Flask Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vampiro-app
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-with-strong-key}
      DATABASE_URL: postgresql://${DB_USER:-vampiro_user}:${DB_PASSWORD:-change_me_in_production}@db:5432/${DB_NAME:-vampiro_db}
      OPEN_FINANCE_PROVIDER: ${OPEN_FINANCE_PROVIDER:-mock}
      OPEN_FINANCE_BASE_URL: ${OPEN_FINANCE_BASE_URL:-}
      OPEN_FINANCE_TOKEN: ${OPEN_FINANCE_TOKEN:-}
      HOST: 0.0.0.0
      PORT: 5000
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - vampiro-network
    restart: unless-stopped

  # Nginx Reverse Proxy (optional, for production)
  nginx:
    image: nginx:alpine
    container_name: vampiro-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    networks:
      - vampiro-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  vampiro-network:
    driver: bridge
